services:
  unifi-network-mcp:
    build:
      context: ..
      dockerfile: apps/network/Dockerfile
    env_file:
      - ../.env
    environment:
      - UNIFI_MCP_HTTP_ENABLED=true
      - UNIFI_MCP_HTTP_TRANSPORT=streamable-http
      - UNIFI_MCP_HOST=0.0.0.0
      - UNIFI_MCP_PORT=3000
      - UNIFI_MCP_ALLOWED_HOSTS=localhost,localhost:3000,127.0.0.1,127.0.0.1:3000,host.docker.internal,host.docker.internal:3000,unifi-network-mcp,unifi-network-mcp:3000
    ports:
      - "3000:3000"
    restart: unless-stopped
    container_name: unifi-network-mcp

  unifi-protect-mcp:
    build:
      context: ..
      dockerfile: apps/protect/Dockerfile
    env_file:
      - ../.env
    environment:
      - UNIFI_MCP_HTTP_ENABLED=true
      - UNIFI_MCP_HTTP_TRANSPORT=streamable-http
      - UNIFI_MCP_HOST=0.0.0.0
      - UNIFI_MCP_PORT=3001
      - UNIFI_MCP_ALLOWED_HOSTS=localhost,localhost:3001,127.0.0.1,127.0.0.1:3001,host.docker.internal,host.docker.internal:3001,unifi-protect-mcp,unifi-protect-mcp:3001
    ports:
      - "3001:3001"
    restart: unless-stopped
    container_name: unifi-protect-mcp

  unifi-access-mcp:
    build:
      context: ..
      dockerfile: apps/access/Dockerfile
    env_file:
      - ../.env
    environment:
      - UNIFI_MCP_HTTP_ENABLED=true
      - UNIFI_MCP_HTTP_TRANSPORT=streamable-http
      - UNIFI_MCP_HOST=0.0.0.0
      - UNIFI_MCP_PORT=3002
      - UNIFI_MCP_ALLOWED_HOSTS=localhost,localhost:3002,127.0.0.1,127.0.0.1:3002,host.docker.internal,host.docker.internal:3002,unifi-access-mcp,unifi-access-mcp:3002
    ports:
      - "3002:3002"
    restart: unless-stopped
    container_name: unifi-access-mcp

  unifi-mcp-relay:
    build:
      context: ..
      dockerfile: packages/unifi-mcp-relay/Dockerfile
    env_file:
      - ../.env
    environment:
      - UNIFI_RELAY_URL=${UNIFI_RELAY_URL:-}
      - UNIFI_RELAY_TOKEN=${UNIFI_RELAY_TOKEN:-}
      - UNIFI_RELAY_LOCATION_NAME=${UNIFI_RELAY_LOCATION_NAME:-Home Lab}
      - UNIFI_RELAY_SERVERS=http://unifi-network-mcp:3000,http://unifi-protect-mcp:3001,http://unifi-access-mcp:3002
    depends_on:
      - unifi-network-mcp
      - unifi-protect-mcp
      - unifi-access-mcp
    restart: unless-stopped
    profiles:
      - relay

  unifi-api:
    build:
      context: ..
      dockerfile: apps/api/Dockerfile
    env_file:
      - ../.env
    environment:
      - UNIFI_API_DB_KEY=${UNIFI_API_DB_KEY:-dev-only-passphrase-change-me}
      - UNIFI_API_DB_PATH=/var/lib/unifi-api/state.db
      - UNIFI_API_HTTP_HOST=0.0.0.0
      - UNIFI_API_HTTP_PORT=8080
      - UNIFI_API_LOGGING_LEVEL=INFO
    ports:
      - "8080:8080"
    volumes:
      - unifi-api-state:/var/lib/unifi-api
    restart: unless-stopped
    container_name: unifi-api
    profiles:
      - api

volumes:
  unifi-api-state:
