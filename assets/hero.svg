<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="u-gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006FFF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <linearGradient id="flow-gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006FFF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <linearGradient id="knot-gr" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#006FFF"/>
      <stop offset="100%" stop-color="#00D4AA"/>
    </linearGradient>
    <radialGradient id="glow" cx="640" cy="310" r="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#006FFF" stop-opacity="0.12"/>
      <stop offset="50%" stop-color="#00D4AA" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#00D4AA" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ============================================ -->
  <!-- Layer 1: Background grid                     -->
  <!-- ============================================ -->
  <g stroke="#006FFF" stroke-width="0.5" opacity="0.04">
    <line x1="80" y1="0" x2="80" y2="640"/><line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/><line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/><line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/><line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/><line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/><line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/><line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
    <line x1="0" y1="80" x2="1280" y2="80"/><line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/><line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/><line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
  </g>

  <!-- ============================================ -->
  <!-- Layer 2: Left — Local Infrastructure         -->
  <!-- (x: 40-480)                                  -->
  <!-- ============================================ -->

  <!-- Local network topology lines -->
  <g stroke="#006FFF" fill="none">
    <line x1="120" y1="200" x2="280" y2="240" stroke-width="1" opacity="0.25"/>
    <line x1="120" y1="200" x2="160" y2="340" stroke-width="1" opacity="0.2"/>
    <line x1="280" y1="240" x2="340" y2="310" stroke-width="1.2" opacity="0.3"/>
    <line x1="160" y1="340" x2="280" y2="350" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="350" x2="340" y2="310" stroke-width="1" opacity="0.25"/>
    <line x1="160" y1="340" x2="120" y2="460" stroke-width="1" opacity="0.2"/>
    <line x1="120" y1="460" x2="280" y2="460" stroke-width="1" opacity="0.25"/>
    <line x1="280" y1="460" x2="340" y2="310" stroke-width="1" opacity="0.2"/>
    <line x1="340" y1="310" x2="430" y2="310" stroke-width="1.5" opacity="0.35"/>
    <line x1="280" y1="240" x2="430" y2="280" stroke-width="1.2" opacity="0.3"/>
    <line x1="280" y1="460" x2="430" y2="380" stroke-width="1.2" opacity="0.3"/>
  </g>

  <!-- Gateway / Router (x:80, y:175) — box with antenna lines -->
  <g opacity="0.45" stroke="#006FFF" fill="none">
    <rect x="90" y="180" width="56" height="36" rx="4" stroke-width="2"/>
    <line x1="108" y1="180" x2="108" y2="166" stroke-width="1.5"/>
    <line x1="108" y1="166" x2="100" y2="158" stroke-width="1.5"/>
    <line x1="108" y1="166" x2="116" y2="158" stroke-width="1.5"/>
    <line x1="130" y1="180" x2="130" y2="170" stroke-width="1.5"/>
    <circle cx="108" cy="200" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="118" cy="200" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="128" cy="200" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="138" cy="200" r="2" fill="#006FFF" stroke="none"/>
  </g>

  <!-- Switch (x:240, y:220) — rounded rect with port dots -->
  <g opacity="0.4" stroke="#006FFF" fill="none">
    <rect x="246" y="224" width="68" height="30" rx="5" stroke-width="2"/>
    <circle cx="260" cy="239" r="2.5" fill="#006FFF" stroke="none"/>
    <circle cx="272" cy="239" r="2.5" fill="#006FFF" stroke="none"/>
    <circle cx="284" cy="239" r="2.5" fill="#006FFF" stroke="none"/>
    <circle cx="296" cy="239" r="2.5" fill="#006FFF" stroke="none"/>
    <circle cx="308" cy="239" r="2.5" fill="#006FFF" stroke="none"/>
  </g>

  <!-- Wireless AP (x:130, y:320) — circle with signal arcs -->
  <g opacity="0.4" stroke="#006FFF" fill="none">
    <circle cx="160" cy="340" r="18" stroke-width="2"/>
    <circle cx="160" cy="340" r="4" fill="#006FFF" stroke="none"/>
    <path d="M 145,325 C 140,318 140,310 148,304" stroke-width="1.5" fill="none"/>
    <path d="M 175,325 C 180,318 180,310 172,304" stroke-width="1.5" fill="none"/>
    <path d="M 150,330 C 147,325 147,319 152,315" stroke-width="1.2" fill="none"/>
    <path d="M 170,330 C 173,325 173,319 168,315" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Camera (x:80, y:440) — angled body with lens circle -->
  <g opacity="0.35" stroke="#006FFF" fill="none">
    <rect x="92" y="442" width="52" height="32" rx="3" stroke-width="2" transform="rotate(-8, 118, 458)"/>
    <circle cx="130" cy="456" r="10" stroke-width="1.8"/>
    <circle cx="130" cy="456" r="5" stroke-width="1.2"/>
    <circle cx="130" cy="456" r="2" fill="#006FFF" stroke="none"/>
  </g>

  <!-- Secondary AP/device (x:250, y:340) — small circle -->
  <g opacity="0.3" stroke="#006FFF" fill="none">
    <circle cx="280" cy="350" r="12" stroke-width="1.5"/>
    <circle cx="280" cy="350" r="3" fill="#006FFF" stroke="none"/>
  </g>

  <!-- Secondary switch (x:250, y:445) — smaller rectangle with ports -->
  <g opacity="0.3" stroke="#006FFF" fill="none">
    <rect x="254" y="448" width="50" height="22" rx="4" stroke-width="1.5"/>
    <circle cx="266" cy="459" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="276" cy="459" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="286" cy="459" r="2" fill="#006FFF" stroke="none"/>
    <circle cx="296" cy="459" r="2" fill="#006FFF" stroke="none"/>
  </g>

  <!-- ============================================ -->
  <!-- Layer 3: Center — Ubiquiti U + Knot          -->
  <!-- (x: 500-780)                                 -->
  <!-- ============================================ -->

  <!-- Radial glow behind U -->
  <circle cx="640" cy="310" r="180" fill="url(#glow)"/>

  <!-- Large Ubiquiti U shape — thick stroke outline -->
  <path d="M 575,240 L 575,340 C 575,395 604,425 640,425 C 676,425 705,395 705,340 L 705,240"
        stroke="url(#u-gr)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.85"/>

  <!-- Subtle outer ring -->
  <circle cx="640" cy="320" r="120" stroke="url(#u-gr)" stroke-width="0.7" fill="none" opacity="0.1"/>

  <!-- Knot accent inside U (scaled version of brand knot) -->
  <g transform="translate(605, 295)">
    <!-- Upper strand (blue) -->
    <path d="M 0,12 C 8,12 12,18 20,21 Q 35,27 50,21 C 58,18 62,12 70,12"
          stroke="#006FFF" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Middle strand (gradient) -->
    <path d="M 0,25 C 10,25 13,34 20,34 C 26,34 30,28 35,25 C 40,22 44,17 50,17 C 60,17 63,25 70,25"
          stroke="url(#knot-gr)" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Lower strand (teal) -->
    <path d="M 0,38 C 8,38 12,32 20,29 Q 35,23 50,29 C 58,32 62,38 70,38"
          stroke="#00D4AA" stroke-width="3" stroke-linecap="round" fill="none" opacity="0.6"/>
    <!-- Over/under crossings -->
    <path d="M 14,16 C 16,18 18,20 20,21" stroke="#006FFF" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 56,34 C 54,32 52,31 50,29" stroke="#00D4AA" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M 47,18 C 48,17 50,17 52,18" stroke="url(#knot-gr)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
    <path d="M 18,33 C 19,34 21,34 23,33" stroke="url(#knot-gr)" stroke-width="5" stroke-linecap="round" fill="none" opacity="0.7"/>
  </g>

  <!-- ============================================ -->
  <!-- Layer 4: Connection flow lines               -->
  <!-- Left devices -> U center -> Right cloud      -->
  <!-- ============================================ -->
  <g fill="none">
    <!-- Flow line 1: upper path -->
    <path d="M 430,280 L 490,275 C 530,270 560,258 575,250"
          stroke="#006FFF" stroke-width="1.5" opacity="0.35"/>
    <path d="M 705,250 C 740,238 780,225 840,218"
          stroke="#00D4AA" stroke-width="1.5" opacity="0.3"/>

    <!-- Flow line 2: main center path -->
    <path d="M 430,310 L 490,312 C 520,314 550,318 575,325"
          stroke="url(#flow-gr)" stroke-width="2" opacity="0.4"/>
    <path d="M 705,325 C 730,318 760,314 800,312 L 860,308"
          stroke="url(#flow-gr)" stroke-width="2" opacity="0.4"/>

    <!-- Flow line 3: lower path -->
    <path d="M 430,380 L 490,370 C 530,362 555,360 575,365"
          stroke="#006FFF" stroke-width="1.5" opacity="0.35"/>
    <path d="M 705,365 C 730,370 770,380 840,398"
          stroke="#00D4AA" stroke-width="1.5" opacity="0.3"/>

    <!-- Flow line 4: upper-wide arc -->
    <path d="M 340,200 C 400,195 470,210 530,235"
          stroke="#006FFF" stroke-width="1.2" opacity="0.25"/>
    <path d="M 740,220 C 800,200 870,185 940,180"
          stroke="#00D4AA" stroke-width="1.2" opacity="0.25"/>

    <!-- Flow line 5: lower-wide arc -->
    <path d="M 300,460 C 380,455 460,430 540,400"
          stroke="#006FFF" stroke-width="1.2" opacity="0.25"/>
    <path d="M 740,400 C 800,430 870,452 940,460"
          stroke="#00D4AA" stroke-width="1.2" opacity="0.25"/>
  </g>

  <!-- ============================================ -->
  <!-- Layer 5: Right — AI / Cloud                  -->
  <!-- (x: 800-1240)                                -->
  <!-- ============================================ -->

  <!-- Cloud outline -->
  <path d="M 940,230 C 910,230 890,250 890,275 C 870,275 855,295 855,318
           C 855,345 875,365 900,365 L 1120,365
           C 1145,365 1165,345 1165,318 C 1165,295 1150,278 1130,273
           C 1130,248 1110,228 1085,228 C 1065,228 1048,240 1042,258
           C 1030,242 1012,232 990,232 C 970,232 953,240 943,254"
        stroke="#00D4AA" stroke-width="1.8" fill="none" opacity="0.25"/>

  <!-- Flowing organic data curves -->
  <g fill="none" stroke="#00D4AA">
    <path d="M 860,218 C 910,210 960,225 1010,215 C 1060,205 1110,220 1160,212 C 1200,206 1240,218 1270,210"
          stroke-width="1.2" opacity="0.2"/>
    <path d="M 860,308 C 910,302 960,315 1010,308 C 1060,300 1110,318 1160,310"
          stroke-width="1.8" opacity="0.28"/>
    <path d="M 840,398 C 890,408 940,392 990,405 C 1040,418 1090,398 1140,410 C 1190,420 1230,405 1270,412"
          stroke-width="1.3" opacity="0.22"/>
    <path d="M 880,480 C 930,470 980,488 1030,478 C 1080,468 1130,485 1180,476"
          stroke-width="1" opacity="0.16"/>
    <path d="M 920,160 C 970,172 1020,158 1070,168 C 1120,178 1170,162 1220,172"
          stroke-width="1" opacity="0.14"/>
    <path d="M 900,540 C 950,530 1000,545 1050,535 C 1100,525 1150,540 1200,532"
          stroke-width="0.8" opacity="0.12"/>
  </g>

  <!-- Circuit-like AI processing nodes -->
  <g fill="#00D4AA" stroke="#00D4AA">
    <!-- Node cluster 1 -->
    <circle cx="920" cy="270" r="4" opacity="0.3" stroke="none"/>
    <circle cx="970" cy="290" r="3" opacity="0.25" stroke="none"/>
    <line x1="920" y1="270" x2="970" y2="290" stroke-width="1" opacity="0.2" fill="none"/>

    <!-- Node cluster 2 -->
    <circle cx="1040" cy="310" r="5" opacity="0.35" stroke="none"/>
    <circle cx="1090" cy="295" r="3.5" opacity="0.28" stroke="none"/>
    <circle cx="1090" cy="330" r="3" opacity="0.22" stroke="none"/>
    <line x1="1040" y1="310" x2="1090" y2="295" stroke-width="1" opacity="0.2" fill="none"/>
    <line x1="1040" y1="310" x2="1090" y2="330" stroke-width="1" opacity="0.18" fill="none"/>
    <line x1="1090" y1="295" x2="1090" y2="330" stroke-width="0.8" opacity="0.15" fill="none"/>

    <!-- Node cluster 3 -->
    <circle cx="1150" cy="270" r="3.5" opacity="0.25" stroke="none"/>
    <circle cx="1180" cy="250" r="2.5" opacity="0.2" stroke="none"/>
    <circle cx="1200" cy="275" r="3" opacity="0.22" stroke="none"/>
    <line x1="1150" y1="270" x2="1180" y2="250" stroke-width="0.8" opacity="0.15" fill="none"/>
    <line x1="1150" y1="270" x2="1200" y2="275" stroke-width="0.8" opacity="0.15" fill="none"/>
    <line x1="1180" y1="250" x2="1200" y2="275" stroke-width="0.8" opacity="0.12" fill="none"/>

    <!-- Node cluster 4 -->
    <circle cx="980" cy="360" r="3.5" opacity="0.28" stroke="none"/>
    <circle cx="1030" cy="380" r="3" opacity="0.22" stroke="none"/>
    <line x1="980" y1="360" x2="1030" y2="380" stroke-width="0.8" opacity="0.16" fill="none"/>

    <!-- Scattered accent nodes -->
    <circle cx="1140" cy="380" r="2.5" opacity="0.18" stroke="none"/>
    <circle cx="1210" cy="340" r="2.5" opacity="0.16" stroke="none"/>
    <circle cx="900" cy="200" r="2.5" opacity="0.18" stroke="none"/>
    <circle cx="1100" cy="430" r="2" opacity="0.14" stroke="none"/>
  </g>

</svg>