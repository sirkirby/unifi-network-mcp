<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640">
  <defs>
    <radialGradient id="glow" cx="640" cy="320" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#8B5CF6" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ============================================ -->
  <!-- Layer 1: Background grid (purple, faint)     -->
  <!-- ============================================ -->
  <g stroke="#8B5CF6" stroke-width="0.5" opacity="0.05">
    <line x1="80" y1="0" x2="80" y2="640"/>
    <line x1="160" y1="0" x2="160" y2="640"/>
    <line x1="240" y1="0" x2="240" y2="640"/>
    <line x1="320" y1="0" x2="320" y2="640"/>
    <line x1="400" y1="0" x2="400" y2="640"/>
    <line x1="480" y1="0" x2="480" y2="640"/>
    <line x1="560" y1="0" x2="560" y2="640"/>
    <line x1="640" y1="0" x2="640" y2="640"/>
    <line x1="720" y1="0" x2="720" y2="640"/>
    <line x1="800" y1="0" x2="800" y2="640"/>
    <line x1="880" y1="0" x2="880" y2="640"/>
    <line x1="960" y1="0" x2="960" y2="640"/>
    <line x1="1040" y1="0" x2="1040" y2="640"/>
    <line x1="1120" y1="0" x2="1120" y2="640"/>
    <line x1="1200" y1="0" x2="1200" y2="640"/>
    <line x1="0" y1="80" x2="1280" y2="80"/>
    <line x1="0" y1="160" x2="1280" y2="160"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="320" x2="1280" y2="320"/>
    <line x1="0" y1="400" x2="1280" y2="400"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="560" x2="1280" y2="560"/>
  </g>

  <!-- ============================================ -->
  <!-- Layer 2: Surveillance nodes (left)           -->
  <!-- Camera nodes with lens indicators + FOV      -->
  <!-- ============================================ -->
  <g>
    <!-- Viewing angle / field-of-view lines -->
    <g stroke="#8B5CF6" fill="none">
      <!-- Camera 1 (top-left) FOV cone -->
      <path d="M 100,130 L 160,100 L 180,160" stroke-width="0.8" opacity="0.15"/>
      <line x1="100" y1="130" x2="200" y2="200" stroke-width="1" opacity="0.2"/>
      <!-- Camera 2 FOV -->
      <path d="M 220,100 L 300,130 L 280,80" stroke-width="0.8" opacity="0.15"/>
      <line x1="220" y1="100" x2="300" y2="200" stroke-width="1" opacity="0.2"/>
      <!-- Camera 3 FOV -->
      <path d="M 160,260 L 240,240 L 220,300" stroke-width="0.8" opacity="0.15"/>
      <line x1="160" y1="260" x2="280" y2="300" stroke-width="1" opacity="0.2"/>
      <!-- Camera 4 FOV -->
      <path d="M 360,180 L 420,200 L 400,160" stroke-width="0.8" opacity="0.15"/>
      <line x1="360" y1="180" x2="440" y2="260" stroke-width="1.2" opacity="0.25"/>
      <!-- Camera 5 (lower) FOV -->
      <path d="M 120,420 L 180,400 L 160,450" stroke-width="0.8" opacity="0.12"/>
      <line x1="120" y1="420" x2="240" y2="440" stroke-width="1" opacity="0.2"/>
      <!-- Connection lines between cameras -->
      <line x1="100" y1="130" x2="220" y2="100" stroke-width="1" opacity="0.25"/>
      <line x1="220" y1="100" x2="360" y2="180" stroke-width="1.2" opacity="0.3"/>
      <line x1="100" y1="130" x2="160" y2="260" stroke-width="1" opacity="0.2"/>
      <line x1="160" y1="260" x2="280" y2="300" stroke-width="1.2" opacity="0.3"/>
      <line x1="360" y1="180" x2="400" y2="300" stroke-width="1.2" opacity="0.3"/>
      <line x1="280" y1="300" x2="400" y2="300" stroke-width="1.5" opacity="0.35"/>
      <line x1="160" y1="260" x2="120" y2="420" stroke-width="1" opacity="0.2"/>
      <line x1="120" y1="420" x2="240" y2="440" stroke-width="1" opacity="0.25"/>
      <line x1="280" y1="300" x2="300" y2="420" stroke-width="1" opacity="0.25"/>
      <line x1="240" y1="440" x2="300" y2="420" stroke-width="1" opacity="0.25"/>
      <line x1="300" y1="420" x2="400" y2="300" stroke-width="1.2" opacity="0.3"/>
      <line x1="120" y1="420" x2="100" y2="520" stroke-width="1" opacity="0.15"/>
      <line x1="240" y1="440" x2="280" y2="520" stroke-width="1" opacity="0.15"/>
      <line x1="300" y1="420" x2="380" y2="480" stroke-width="1" opacity="0.2"/>
      <!-- Lines toward center -->
      <line x1="400" y1="300" x2="490" y2="310" stroke-width="1.5" opacity="0.35"/>
      <line x1="360" y1="180" x2="470" y2="250" stroke-width="1.2" opacity="0.3"/>
      <line x1="380" y1="480" x2="470" y2="400" stroke-width="1.2" opacity="0.3"/>
    </g>
    <!-- Camera nodes (circles with inner lens circles) -->
    <g fill="#8B5CF6">
      <!-- Camera 1 -->
      <circle cx="100" cy="130" r="8" opacity="0.35"/>
      <circle cx="100" cy="130" r="3.5" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.6"/>
      <!-- Camera 2 -->
      <circle cx="220" cy="100" r="7" opacity="0.3"/>
      <circle cx="220" cy="100" r="3" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
      <!-- Camera 3 -->
      <circle cx="160" cy="260" r="7" opacity="0.35"/>
      <circle cx="160" cy="260" r="3" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.55"/>
      <!-- Camera 4 -->
      <circle cx="360" cy="180" r="7" opacity="0.3"/>
      <circle cx="360" cy="180" r="3" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.5"/>
      <!-- Camera 5 -->
      <circle cx="120" cy="420" r="7" opacity="0.25"/>
      <circle cx="120" cy="420" r="3" fill="none" stroke="#8B5CF6" stroke-width="1" opacity="0.4"/>
      <!-- Regular nodes -->
      <circle cx="280" cy="300" r="6" opacity="0.35"/>
      <circle cx="400" cy="300" r="7" opacity="0.4"/>
      <circle cx="240" cy="440" r="5" opacity="0.25"/>
      <circle cx="300" cy="420" r="5" opacity="0.3"/>
      <circle cx="380" cy="480" r="5" opacity="0.25"/>
      <circle cx="100" cy="520" r="4" opacity="0.15"/>
      <circle cx="280" cy="520" r="4" opacity="0.15"/>
    </g>
  </g>

  <!-- ============================================ -->
  <!-- Layer 3: Center convergence + knot           -->
  <!-- ============================================ -->
  <circle cx="640" cy="320" r="280" fill="url(#glow)"/>

  <!-- Transition lines -->
  <g fill="none" stroke="#8B5CF6">
    <path d="M 470,250 C 520,260 570,285 605,305" stroke-width="1.5" opacity="0.25"/>
    <path d="M 490,310 C 530,315 575,318 605,320" stroke-width="2" opacity="0.35"/>
    <path d="M 470,400 C 520,385 570,350 605,338" stroke-width="1.5" opacity="0.25"/>
    <path d="M 490,200 C 540,220 580,270 605,295" stroke-width="1.2" opacity="0.2"/>
    <!-- Lines emerging toward right -->
    <path d="M 675,320 C 710,318 760,315 810,310" stroke-width="2" opacity="0.35"/>
    <path d="M 675,305 C 720,290 770,260 830,240" stroke-width="1.5" opacity="0.25"/>
    <path d="M 675,335 C 720,350 770,380 830,400" stroke-width="1.5" opacity="0.25"/>
    <path d="M 670,290 C 700,260 750,220 820,180" stroke-width="1.2" opacity="0.2"/>
    <path d="M 670,350 C 700,380 750,430 820,470" stroke-width="1.2" opacity="0.2"/>
  </g>

  <!-- Knot (from logo-protect.svg, scaled to ~100px) -->
  <g transform="translate(590, 280)">
    <!-- Upper strand -->
    <path d="M 0,22 C 12,22 18,30 28,34 Q 50,42 72,34 C 82,30 88,22 100,22"
          stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Middle strand -->
    <path d="M 0,40 C 14,40 18,52 28,52 C 36,52 40,44 50,40 C 60,36 64,28 72,28 C 84,28 88,40 100,40"
          stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- Lower strand -->
    <path d="M 0,58 C 12,58 18,50 28,46 Q 50,38 72,46 C 82,50 88,58 100,58"
          stroke="#8B5CF6" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.8"/>
    <!-- Over/under crossings -->
    <path d="M 20,27 C 23,30 26,33 28,35" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M 80,53 C 77,50 75,48 73,46" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.8"/>
    <path d="M 68,29 C 70,28 72,28 74,29" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
    <path d="M 26,51 C 28,52 30,52 32,51" stroke="#8B5CF6" stroke-width="6" stroke-linecap="round" fill="none" opacity="0.9"/>
    <!-- Shield icon inside knot -->
    <path d="M 50,34 L 57,37 L 57,43 C 57,46 54,49 50,50 C 46,49 43,46 43,43 L 43,37 Z"
          stroke="#8B5CF6" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.7"/>
  </g>

  <!-- Glow rings -->
  <circle cx="640" cy="320" r="70" stroke="#8B5CF6" stroke-width="0.8" fill="none" opacity="0.15"/>
  <circle cx="640" cy="320" r="95" stroke="#8B5CF6" stroke-width="0.5" fill="none" opacity="0.08"/>

  <!-- ============================================ -->
  <!-- Layer 4: Video streams + detection (right)   -->
  <!-- ============================================ -->
  <g fill="none" stroke="#8B5CF6">
    <!-- Flowing video stream curves -->
    <path d="M 880,180 C 920,170 980,190 1020,160 C 1060,130 1100,150 1160,140 C 1200,134 1240,148 1270,138"
          stroke-width="1.2" opacity="0.2"/>
    <path d="M 830,240 C 880,230 930,260 980,240 C 1040,216 1080,250 1140,230 C 1180,218 1230,240 1280,225"
          stroke-width="1.5" opacity="0.25"/>
    <path d="M 810,310 C 870,305 920,320 970,310 C 1030,298 1080,325 1130,315 C 1180,305 1220,320 1280,312"
          stroke-width="2" opacity="0.3"/>
    <path d="M 830,400 C 880,410 930,390 980,405 C 1040,422 1080,395 1140,410 C 1190,420 1230,400 1280,408"
          stroke-width="1.5" opacity="0.25"/>
    <path d="M 880,460 C 930,475 980,450 1030,470 C 1080,490 1130,460 1180,475 C 1220,486 1250,470 1280,478"
          stroke-width="1.2" opacity="0.2"/>
    <path d="M 920,530 C 970,520 1020,540 1070,525 C 1120,510 1170,535 1220,520 C 1250,512 1270,525 1280,520"
          stroke-width="1" opacity="0.15"/>
    <!-- Motion detection wave pulses -->
    <circle cx="950" cy="280" r="20" stroke-width="0.8" opacity="0.12"/>
    <circle cx="950" cy="280" r="35" stroke-width="0.6" opacity="0.08"/>
    <circle cx="1100" cy="380" r="20" stroke-width="0.8" opacity="0.12"/>
    <circle cx="1100" cy="380" r="35" stroke-width="0.6" opacity="0.08"/>
    <!-- Subtle depth curves -->
    <path d="M 850,270 C 910,280 960,255 1010,275 C 1060,295 1110,265 1160,280"
          stroke-width="1" opacity="0.15"/>
    <path d="M 850,370 C 910,360 960,380 1010,365 C 1060,350 1110,375 1160,360"
          stroke-width="1" opacity="0.15"/>
    <path d="M 900,120 C 950,140 1000,115 1060,130 C 1120,145 1180,120 1240,135"
          stroke-width="1" opacity="0.12"/>
    <path d="M 900,560 C 960,545 1020,565 1080,550 C 1140,535 1200,555 1260,545"
          stroke-width="1" opacity="0.1"/>
  </g>
</svg>