version: 3
config_version: 4
embedding:
  provider: ollama
  model: bge-m3:latest
daemon:
  port: 28221
  log_level: info
  log_retention_days: 30
capture:
  transcript_paths: []
  plan_dirs:
    - docs/superpowers/plans/
    - docs/superpowers/specs/
  artifact_extensions:
    - .md
  buffer_max_events: 500
agent:
  summary_batch_interval: 10
  scheduled_tasks_enabled: true
  event_tasks_enabled: true
  provider:
    type: anthropic
  tasks:
    full-intelligence: {}
    skill-generate:
      provider:
        type: anthropic
      phases:
        draft:
          maxTurns: 20
        validate:
          maxTurns: 30
      schedule:
        enabled: false
    skill-evolve:
      provider:
        type: anthropic
      schedule:
        enabled: true
    skill-survey:
      provider:
        type: anthropic
context:
  digest_tier: 5000
  prompt_search: true
  prompt_max_spores: 3
backup:
  dir: ~/myco_backups/unifi-mcp
maintenance:
  auto_optimize: true
  auto_optimize_interval_hours: 24
team:
  enabled: false
  interval_minutes: 15
skills:
  confidence_threshold: 0.7
  usage_stale_days: 30
notifications:
  enabled: true
  system_notifications: true
  default_mode: summary
  domains:
    mycelium:
      enabled: false
    sessions:
      enabled: false
