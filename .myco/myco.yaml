version: 3
config_version: 6
embedding:
  provider: ollama
  model: bge-m3:latest
daemon:
  port: 28221
  log_level: info
  log_retention_days: 30
  stale_session_threshold_ms: 3600000
capture:
  transcript_paths: []
  plan_dirs:
    - docs/superpowers/plans/
    - docs/superpowers/specs/
  ignore_plan_dirs_in_git: false
  artifact_extensions:
    - .md
  buffer_max_events: 500
agent:
  summary_batch_interval: 10
  scheduled_tasks_enabled: true
  event_tasks_enabled: true
  provider:
    type: anthropic
  tasks:
    skill-generate:
      provider:
        type: anthropic
      phases:
        draft:
          maxTurns: 20
        validate:
          maxTurns: 30
      schedule:
        enabled: false
    skill-evolve:
      provider:
        type: anthropic
      schedule:
        enabled: true
    skill-survey:
      provider:
        type: anthropic
    vault-evolve: {}
context:
  digest_tier: 5000
  session_start_digest_enabled: false
  cortex_enabled: true
  prompt_search: true
  prompt_max_spores: 3
backup:
  dir: ~/myco_backups/unifi-mcp
maintenance:
  auto_optimize: true
  auto_optimize_interval_hours: 24
team:
  enabled: false
  interval_minutes: 15
skills:
  confidence_threshold: 0.7
  usage_stale_days: 30
notifications:
  enabled: true
  system_notifications: true
  default_mode: summary
  domains:
    mycelium:
      enabled: false
    sessions:
      enabled: false
    settings:
      enabled: true
      mode: banner
appearance:
  theme: sage
  mode: dark
  font: default
  density: normal
symbionts:
  claude-code:
    enabled: true
  codex:
    enabled: true
  gemini:
    enabled: true
  opencode:
    enabled: true
