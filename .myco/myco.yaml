version: 3
config_version: 8
embedding:
  provider: ollama
  model: bge-m3:latest
  run_in_deep_sleep: true
daemon:
  port: 28221
  log_level: info
  log_retention_days: 30
  stale_session_threshold_ms: 3600000
hub:
  url: http://127.0.0.1:21000
capture:
  transcript_paths: []
  plan_dirs:
    - docs/superpowers/plans/
    - docs/superpowers/specs/
  ignore_plan_dirs_in_git: false
  artifact_extensions:
    - .md
  buffer_max_events: 500
agent:
  summary_batch_interval: 10
  scheduled_tasks_enabled: true
  event_tasks_enabled: true
  provider:
    type: anthropic
backup:
  dir: ~/myco_backups/unifi-mcp
maintenance:
  auto_optimize: true
  auto_optimize_interval_hours: 24
update:
  channel: stable
team:
  enabled: false
  interval_minutes: 15
skills:
  confidence_threshold: 0.7
  usage_stale_days: 30
notifications:
  enabled: true
  system_notifications: true
  default_mode: summary
  domains:
    mycelium:
      enabled: false
    sessions:
      enabled: false
    settings:
      enabled: true
      mode: banner
cortex:
  enabled: true
  instructions:
    inject_on_session_start: true
  digest:
    tier: 5000
    inject_on_session_start: false
  spores:
    inject_on_prompt_submit: true
    max_per_prompt: 3
  canopy:
    refresh:
      background_enabled: true
      background_period_minutes: 60
    exclude:
      default_patterns:
        - .git
        - .DS_Store
        - node_modules
        - __pycache__
        - .venv
        - venv
        - env
        - ENV
        - .pytest_cache
        - .ruff_cache
        - .mypy_cache
        - .tox
        - dist
        - build
        - target
        - .gradle
        - .cache
        - .next
        - .nuxt
        - .turbo
        - .svelte-kit
        - "**/*.lock"
        - "**/package-lock.json"
        - "**/pnpm-lock.yaml"
        - "**/yarn.lock"
      patterns: []
    inject_on_pre_tool_use: true
    min_file_bytes: 800
appearance:
  theme: sage
  mode: dark
  font: default
  density: normal
