<tr {% if r.outcome != "success" %}class="row-error"{% endif %}>
  <td><small>{{ r.ts[:19] }}</small></td>
  <td><code class="compact">{{ r.key_id_prefix }}</code></td>
  <td><code class="compact">{{ r.controller or "" }}</code></td>
  <td>{{ r.target }}</td>
  <td>{{ r.outcome }}</td>
  <td><small>{{ r.error_kind or "" }}</small></td>
</tr>
