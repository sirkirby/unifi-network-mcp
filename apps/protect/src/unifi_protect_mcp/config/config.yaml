unifi:
  host: ${oc.env:UNIFI_PROTECT_HOST,""}
  username: ${oc.env:UNIFI_PROTECT_USERNAME,""}
  password: ${oc.env:UNIFI_PROTECT_PASSWORD,""}
  port: ${oc.env:UNIFI_PROTECT_PORT,443}
  site: ${oc.env:UNIFI_PROTECT_SITE,default}
  verify_ssl: ${oc.env:UNIFI_PROTECT_VERIFY_SSL,false}
  api_key: ${oc.env:UNIFI_PROTECT_API_KEY,""}

server:
  host: ${oc.env:UNIFI_MCP_HOST,0.0.0.0}
  port: ${oc.env:UNIFI_MCP_PORT,3001}
  log_level: INFO

  # Tool registration mode
  # Options: eager, lazy, meta_only
  # - eager: Register all tools immediately - Best for dev console, automation
  # - lazy: Register meta-tools, load others on-demand - RECOMMENDED for LLMs
  # - meta_only: Register only meta-tools, manual discovery - Maximum context savings
  tool_registration_mode: ${oc.env:UNIFI_TOOL_REGISTRATION_MODE,lazy}

  # Tool filtering (optional, for eager mode)
  # Use these to limit which tools are registered for automation workflows
  #
  # enabled_categories: Only load tools from these categories (module names in src/tools/)
  #   Valid values:
  #     - cameras      # Camera listing, PTZ, snapshot
  #     - events       # Motion events, smart detections
  #     - recordings   # Recording clips, playback
  #     - devices      # All Protect devices (lights, sensors, chimes)
  #     - liveviews    # Liveview management
  #     - system       # System info, NVR health, storage
  #     - alarm        # Alarm Manager arm/disarm (Protect 6.1+)
  #   Example: "cameras,events,system" or ["cameras", "events", "system"]
  #
  # enabled_tools: Only register these specific tools (use with enabled_categories or alone)
  #   Example: "protect_list_cameras,protect_get_events" or ["protect_list_cameras", "protect_get_events"]
  #
  # Note: Tools may also be filtered by policy gates (UNIFI_POLICY_ env vars)
  # If neither is set, all tools are registered (default behavior)
  enabled_categories: ${oc.env:UNIFI_ENABLED_CATEGORIES,null}
  enabled_tools: ${oc.env:UNIFI_ENABLED_TOOLS,null}

  http:
    enabled: ${oc.env:UNIFI_MCP_HTTP_ENABLED,true}
    force: ${oc.env:UNIFI_MCP_HTTP_FORCE,false}
    transport: ${oc.env:UNIFI_MCP_HTTP_TRANSPORT,streamable-http}
  diagnostics:
    enabled: ${oc.env:UNIFI_MCP_DIAGNOSTICS,false}
    log_tool_args: ${oc.env:UNIFI_MCP_DIAG_LOG_TOOL_ARGS,true}
    log_tool_result: ${oc.env:UNIFI_MCP_DIAG_LOG_TOOL_RESULT,true}
    max_payload_chars: ${oc.env:UNIFI_MCP_DIAG_MAX_PAYLOAD,2000}

protect:
  events:
    buffer_size: ${oc.env:PROTECT_EVENT_BUFFER_SIZE,100}
    buffer_ttl_seconds: ${oc.env:PROTECT_EVENT_BUFFER_TTL,300}
    websocket_enabled: ${oc.env:PROTECT_WEBSOCKET_ENABLED,true}
    smart_detection_min_confidence: ${oc.env:PROTECT_SMART_DETECTION_MIN_CONFIDENCE,50}

# Permissions are controlled via environment variables:
#   UNIFI_TOOL_PERMISSION_MODE=confirm|bypass (default: confirm)
#   UNIFI_POLICY_<ACTION>=true|false (global policy gates)
#   UNIFI_POLICY_<SERVER>_<ACTION>=true|false (per-server)
#   UNIFI_POLICY_<SERVER>_<CATEGORY>_<ACTION>=true|false (per-category)
# See documentation for details.
