name: "API: Docker Build (main + PR)"

# Validates the Docker image on every push-to-main and PR.
# On main, also pushes :main and :sha-<sha> dev images.
# api/v* TAG releases are owned by release-api.yml — that workflow
# fan-outs PyPI + Docker in parallel, then creates the GitHub Release
# only when both succeed.

on:
  push:
    branches: [ "main" ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/unifi-api-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to determine version from tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from git
        id: version
        run: |
          # Derive PEP 440 version from api/v* tags
          if git describe --tags --match 'api/v*' HEAD >/dev/null 2>&1; then
            RAW=$(git describe --tags --match 'api/v*' HEAD)
            BASE=$(echo "$RAW" | sed 's|^api/v||' | sed 's/-.*//')
          else
            RAW=""
            BASE="0.0.0"
          fi
          if [ -n "$RAW" ] && ! echo "$RAW" | grep -q '-'; then
            VERSION="$BASE"
          else
            COMMITS=$(git rev-list --count HEAD)
            SHA=$(git rev-parse --short HEAD)
            VERSION="${BASE}.dev${COMMITS}+g${SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
