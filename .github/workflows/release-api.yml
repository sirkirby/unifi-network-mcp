name: "API: Release (PyPI + GitHub Release)"

# Triggered on api/v* tags. Each tag fires:
#   1. Run the unifi-api-server test suite
#   2. Build the wheel and publish to PyPI via OIDC trusted publishing
#   3. Create a GitHub Release with auto-generated notes + the wheel attached
#
# Docker images are built and pushed by the separate docker-api.yml workflow,
# which also fires on api/v* tags (in addition to main pushes and PRs).
#
# One-time PyPI prerequisite: register `unifi-api-server` as a pending publisher
# at https://pypi.org/manage/account/publishing/ with:
#   Owner:        sirkirby
#   Repository:   unifi-mcp
#   Workflow:     release-api.yml
#   Environment:  pypi

on:
  push:
    tags:
      - 'api/v*'

permissions:
  contents: read

jobs:
  # ----------------------------------------------------------------------- 1
  test:
    name: Run unifi-api-server tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install workspace
        run: uv sync --all-packages

      - name: Run tests
        run: uv run --package unifi-api-server pytest apps/api/tests -q

  # ----------------------------------------------------------------------- 2
  publish-pypi:
    name: Build wheel + publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/unifi-api-server
    permissions:
      id-token: write  # OIDC for PyPI trusted publishing

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Build wheel
        run: uv build --package unifi-api-server

      - name: Upload wheel artifact (for github-release job)
        uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/*.whl

      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1

  # ----------------------------------------------------------------------- 3
  github-release:
    name: Create GitHub Release
    needs: publish-pypi
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/download-artifact@v4
        with:
          name: wheel
          path: dist/

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if echo "${REF_NAME}" | grep -qE -- '-(rc|alpha|beta|dev)'; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi
          gh release create "${REF_NAME}" \
            --generate-notes \
            --title "unifi-api-server ${REF_NAME}" \
            ${PRERELEASE_FLAG} \
            dist/*.whl
