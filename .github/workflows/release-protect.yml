name: "UniFi Protect MCP: Release (test → PyPI + GHCR in parallel → GitHub Release)"

# Triggered on protect/v* tags. The release is atomic:
#
#   test ──┬── publish-pypi ──┐
#          └── publish-docker ┴── github-release
#
# Both publishes must succeed before the GitHub Release is created.

on:
  push:
    tags:
      - 'protect/v*.*.*'

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/unifi-protect-mcp

jobs:
  test:
    name: Run unifi-protect-mcp tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Install workspace
        run: uv sync --all-packages
      - name: Run tests
        run: uv run --package unifi-protect-mcp pytest apps/protect/tests -n auto -q

  publish-pypi:
    name: Build wheel + publish to PyPI
    needs: test
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/unifi-protect-mcp
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - name: Build wheel
        run: uv build --package unifi-protect-mcp
      - name: Upload distributions for github-release
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
      - name: Publish to PyPI via OIDC
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-docker:
    name: Build + push Docker image
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Derive version + image tag list
        id: version
        env:
          REF_NAME: ${{ github.ref_name }}
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          VERSION="${REF_NAME#protect/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          if echo "${VERSION}" | grep -qE -- '-(rc|alpha|beta|dev)'; then
            {
              echo "tags<<EOF"
              echo "${IMAGE_REF}:${VERSION}"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            {
              echo "tags<<EOF"
              echo "${IMAGE_REF}:${VERSION}"
              echo "${IMAGE_REF}:latest"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi
      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/protect/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.version.outputs.tags }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  github-release:
    name: Create GitHub Release
    needs: [publish-pypi, publish-docker]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Generate path-scoped release notes
        env:
          REF_NAME: ${{ github.ref_name }}
        run: python3 scripts/generate_release_notes.py --tag "${REF_NAME}" --output /tmp/release-notes.md
      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${REF_NAME#protect/v}"
          if echo "${VERSION}" | grep -qE -- '-(rc|alpha|beta|dev)'; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG=""
          fi
          gh release create "${REF_NAME}" \
            --title "UniFi Protect MCP v${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --latest=false \
            --verify-tag \
            ${PRERELEASE_FLAG} \
            dist/*
