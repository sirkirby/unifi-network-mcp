name: "Network: Publish to PyPI"

on:
  push:
    tags:
      - 'network/v*.*.*'
      - 'v*.*.*'  # Legacy tag format

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    environment:
       name: pypi
       url: https://pypi.org/p/unifi-network-mcp
    permissions:
      id-token: write # IMPORTANT: required for trusted publishing
      contents: write # Required for creating GitHub releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Full history needed for hatch-vcs to determine version from tags
        fetch-tags: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Build package
      run: uv build --package unifi-network-mcp

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        PREFIX="${TAG%%/v*}"
        VERSION="${TAG#*/v}"

        # Handle legacy v*.*.* tags (network only)
        if [[ "$TAG" =~ ^v[0-9] ]]; then
          PREFIX="network"
          VERSION="${TAG#v}"
        fi

        DISPLAY_NAME="UniFi Network MCP"
        PYPI_PACKAGE="unifi-network-mcp"

        # Find previous tag for same prefix
        PREV_TAG=$(git tag --list "${PREFIX}/v*" --sort=-version:refname | sed -n '2p')
        if [ -z "$PREV_TAG" ]; then
          PREV_TAG=$(git tag --list "v*.*.*" --sort=-version:refname | sed -n '2p')
        fi

        NOTES_START_TAG_FLAG=""
        if [ -n "$PREV_TAG" ]; then
          NOTES_START_TAG_FLAG="--notes-start-tag $PREV_TAG"
        fi

        gh release create "$TAG" \
          --title "${DISPLAY_NAME} v${VERSION}" \
          --generate-notes \
          $NOTES_START_TAG_FLAG \
          --notes "Install or upgrade:
        \`\`\`bash
        uvx ${PYPI_PACKAGE}==${VERSION}
        \`\`\`

        [![PyPI](https://img.shields.io/pypi/v/${PYPI_PACKAGE})](https://pypi.org/project/${PYPI_PACKAGE}/${VERSION}/)" \
          --latest=false \
          --verify-tag
