name: "Relay: Publish to PyPI"

on:
  push:
    tags:
      - 'relay/v*.*.*'

permissions:
  contents: read

jobs:
  build-and-publish:
    name: Build and publish Python distributions to PyPI
    runs-on: ubuntu-latest
    environment:
       name: pypi
       url: https://pypi.org/p/unifi-mcp-relay
    permissions:
      id-token: write # IMPORTANT: required for trusted publishing
      contents: write # Required for creating GitHub releases

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
        fetch-tags: true

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Install uv
      uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true

    - name: Build package
      run: uv build --package unifi-mcp-relay

    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1

    - name: Create GitHub release
      env:
        GH_TOKEN: ${{ secrets.PUSH_TOKEN }}
      run: |
        TAG="${GITHUB_REF#refs/tags/}"
        PREFIX="${TAG%%/v*}"
        VERSION="${TAG#*/v}"

        DISPLAY_NAME="UniFi MCP Relay"
        PYPI_PACKAGE="unifi-mcp-relay"

        # Find previous tag for same prefix
        PREV_TAG=$(git tag --list "${PREFIX}/v*" --sort=-version:refname | sed -n '2p')

        NOTES_START_TAG_FLAG=""
        if [ -n "$PREV_TAG" ]; then
          NOTES_START_TAG_FLAG="--notes-start-tag $PREV_TAG"
        fi

        gh release create "$TAG" \
          --title "${DISPLAY_NAME} v${VERSION}" \
          --generate-notes \
          $NOTES_START_TAG_FLAG \
          --notes "Install or upgrade:
        \`\`\`bash
        pip install ${PYPI_PACKAGE}==${VERSION}
        \`\`\`

        [![PyPI](https://img.shields.io/pypi/v/${PYPI_PACKAGE})](https://pypi.org/project/${PYPI_PACKAGE}/${VERSION}/)" \
          --latest=false \
          --verify-tag
