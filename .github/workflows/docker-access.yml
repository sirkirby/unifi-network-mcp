name: "Access: Docker Build and Publish"

on:
  push:
    branches: [ "main" ]
    tags: [ 'access/v*.*.*' ]
  pull_request:
    types: [ opened, synchronize, reopened ]
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/unifi-access-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for hatch-vcs to determine version from tags

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get version from git
        id: version
        run: |
          # Derive PEP 440 version from git tags
          # Check for access/ prefixed tags first (monorepo), then plain v* tags
          if git describe --tags --match 'access/v*' HEAD >/dev/null 2>&1; then
            RAW=$(git describe --tags --match 'access/v*' HEAD)
            BASE=$(echo "$RAW" | sed 's|^access/v||' | sed 's/-.*//')
          elif git describe --tags --match 'v*' HEAD >/dev/null 2>&1; then
            RAW=$(git describe --tags --match 'v*' HEAD)
            BASE=$(echo "$RAW" | sed 's/^v//' | sed 's/-.*//')
          else
            RAW=""
            BASE="0.0.0"
          fi
          # If exactly on a tag, use the clean version; otherwise build a PEP 440 dev version
          if [ -n "$RAW" ] && ! echo "$RAW" | grep -q '-'; then
            VERSION="$BASE"
          else
            COMMITS=$(git rev-list --count HEAD)
            SHA=$(git rev-parse --short HEAD)
            VERSION="${BASE}.dev${COMMITS}+g${SHA}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Set latest tag for main branch
            type=raw,value=latest,enable={{is_default_branch}}
            # Tag with branch name (e.g., main, develop)
            type=ref,event=branch
            # Tag with PR number (e.g., pr-2)
            type=ref,event=pr
            # Tag with version from git (e.g., 0.1.0) for tag pushes
            type=raw,value=${{ steps.version.outputs.version }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            # Tag with git sha
            type=sha,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .  # Workspace root (monorepo layout)
          file: apps/access/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
