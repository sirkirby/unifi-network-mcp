name: "Sync versions on release"

on:
  push:
    tags:
      - 'network/v*.*.*'
      - 'protect/v*.*.*'
      - 'access/v*.*.*'
      - 'core/v*.*.*'
      - 'shared/v*.*.*'
      - 'relay/v*.*.*'
      - 'v*.*.*'  # Legacy tag format (network)

# Debounce: if multiple tags are pushed within seconds, only the last
# workflow run proceeds. Earlier runs detect the branch has moved and skip.
concurrency:
  group: bump-versions
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  bump:
    name: Sync all version references
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6
      with:
        ref: main
        fetch-depth: 0
        fetch-tags: true
        token: ${{ secrets.PUSH_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"

    - name: Detect tagged versions and update files
      run: |
        get_version() {
          local prefix="$1"
          git tag --list "${prefix}/v*" --sort=-version:refname | head -1 | sed "s|${prefix}/v||"
        }

        get_legacy_version() {
          git tag --list "v*.*.*" --sort=-version:refname | head -1 | sed 's|^v||'
        }

        update_plugin_version() {
          local plugin_json="$1"
          local version="$2"

          if [ -z "$version" ] || [ ! -f "$plugin_json" ]; then
            return
          fi

          current=$(python3 -c "import json; print(json.load(open('${plugin_json}'))['version'])")
          if [ "$current" = "$version" ]; then
            echo "  $plugin_json already at $version"
            return
          fi

          python3 -c "
        import json, sys
        pj = sys.argv[1]
        ver = sys.argv[2]
        with open(pj) as f:
            data = json.load(f)
        data['version'] = ver
        for server in data.get('mcpServers', {}).values():
            args = server.get('args', [])
            if args:
                pkg = args[0].split('==')[0]
                args[0] = f'{pkg}=={ver}'
        with open(pj, 'w') as f:
            json.dump(data, f, indent=2)
            f.write('\n')
        " "$plugin_json" "$version"
          echo "  $plugin_json: $current -> $version"
        }

        NETWORK_VERSION=$(get_version "network")
        if [ -z "$NETWORK_VERSION" ]; then
          NETWORK_VERSION=$(get_legacy_version)
        fi
        PROTECT_VERSION=$(get_version "protect")
        ACCESS_VERSION=$(get_version "access")
        CORE_VERSION=$(get_version "core")
        SHARED_VERSION=$(get_version "shared")
        RELAY_VERSION=$(get_version "relay")

        echo "Detected versions:"
        echo "  Network: ${NETWORK_VERSION:-not tagged}"
        echo "  Protect: ${PROTECT_VERSION:-not tagged}"
        echo "  Access:  ${ACCESS_VERSION:-not tagged}"
        echo "  Core:    ${CORE_VERSION:-not tagged}"
        echo "  Shared:  ${SHARED_VERSION:-not tagged}"
        echo "  Relay:   ${RELAY_VERSION:-not tagged}"

        # Update plugin.json versions
        update_plugin_version "plugins/unifi-network/.claude-plugin/plugin.json" "$NETWORK_VERSION"
        update_plugin_version "plugins/unifi-protect/.claude-plugin/plugin.json" "$PROTECT_VERSION"
        update_plugin_version "plugins/unifi-access/.claude-plugin/plugin.json" "$ACCESS_VERSION"

    - name: Commit and push if changed
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

        git add -A

        if git diff --cached --quiet; then
          echo "No version changes to commit"
          exit 0
        fi

        git commit -m "chore(plugins): sync plugin versions to current release tags"
        git push
